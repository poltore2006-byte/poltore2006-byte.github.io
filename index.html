<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliç Aniversari ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #ffe6e6, #ffffff);
      text-align: center;
      overflow-x: hidden;
      transition: background 1s ease; /* Para que el cambio al modo Barça sea suave */
    }

    h1 {
      color: #ff4d6d;
      margin-top: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    /* Estilo del contador */
    #tiempo-juntos {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    p {
      font-size: 18px;
      color: #333;
      font-weight: bold;
    }

    img {
      width: 300px;
      border-radius: 20px;
      margin: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05) rotate(2deg);
    }

    button {
      padding: 15px 30px;
      background-color: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 18px;
      margin: 10px;
      box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .btn-barca {
      background-color: #004d98;
      box-shadow: 0 5px 15px rgba(0, 77, 152, 0.4);
    }

    @keyframes caer {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .corazon-caida {
      position: fixed;
      top: -10vh;
      user-select: none;
      pointer-events: none;
      z-index: 999;
      animation: caer linear forwards;
    }
  </style>
</head>

<body>

  <h1>Feliç Aniversari ❤️</h1>

  <div id="tiempo-juntos">
    <p style="margin: 0; color: #ff4d6d;">Portem junts:</p>
    <h2 id="reloj" style="margin: 5px 0; color: #333;">Cargando...</h2>
  </div>

  <br>

  <img src="Foto1.jpg" alt="Nosotros">
  <p>BARÇAAAA 💙❤️</p>

  <img src="Foto3.jpg" alt="Nosotros">
  <p>Un dels dies més feliços amb tu ❤️</p>

  <img src="Foto2.jpg" alt="Nosotros">
  <p>El nostre primer viatge junts 🌍</p>

  <img src="Foto4.jpg" alt="Nosotros">
  <p>Aquests moments mai els oblidaré 💫</p>

  <br>

  <button onclick="mensaje()">Clica aquí 💌</button>
  <button class="btn-barca" onclick="modoBarca()">Força Barça! 🔵🔴</button>

  <script>
    // 1. CONFIGURACIÓN DEL CONTADOR (Cambia la fecha aquí)
    // 2025, 04, 1
    const fechaInicio = new Date(2025, 01, 1); 

    function actualizarReloj() {
      const ahora = new Date();
      const dif = ahora - fechaInicio;

      const dias = Math.floor(dif / (1000 * 60 * 60 * 24));
      const horas = Math.floor((dif / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((dif / 1000 / 60) % 60);
      const segs = Math.floor((dif / 1000) % 60);

      document.getElementById('reloj').innerText = `${dias}d ${horas}h ${mins}m ${segs}s`;
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    // 2. MODO BARÇA
    function modoBarca() {
      document.body.style.background = "linear-gradient(to bottom, #004d98, #a50044)";
      document.querySelectorAll('h1, p, h2').forEach(el => el.style.color = "white");
      alert("¡Més que un club, i més que una núvia! ❤️💙");
    }

    // 3. MENSAJE BOTÓN
    function mensaje() {
      alert("Ets el millor que m'ha passat en aquesta vida ❤️");
    }

    // 4. LLUVIA DE CORAZONES
    function crearCorazon() {
      const corazon = document.createElement("div");
      corazon.className = "corazon-caida";
      corazon.innerHTML = "❤️";
      corazon.style.left = Math.random() * 100 + "vw";
      corazon.style.fontSize = Math.random() * 20 + 15 + "px";
      corazon.style.animationDuration = Math.random() * 3 + 3 + "s";
      document.body.appendChild(corazon);
      setTimeout(() => { corazon.remove(); }, 6000);
    }
    setInterval(crearCorazon, 400);
  </script>

</body>
</html>
</body>
</html>
