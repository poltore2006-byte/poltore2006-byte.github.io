<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliç Aniversari ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif; /* Un toque más personal */
      background: linear-gradient(to bottom, #ffe6e6, #ffffff);
      text-align: center;
      overflow-x: hidden;
    }

    h1 { color: #ff4d6d; margin-top: 40px; font-size: 35px; }

    #tiempo-juntos {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* EFECTO POLAROID */
    .foto-container {
      display: inline-block;
      background: white;
      padding: 15px 15px 40px 15px;
      margin: 20px;
      border: 1px solid #ddd;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transform: rotate(-3deg); /* Unas giradas a un lado... */
      transition: 0.4s;
      opacity: 0; /* Para el efecto scroll */
    }

    .foto-container:nth-child(even) {
      transform: rotate(3deg); /* ...y otras al otro */
    }

    .foto-container img {
      width: 280px;
      display: block;
      border-radius: 0; /* Las polaroid son rectas */
    }

    .foto-container p {
      margin-top: 15px;
      font-size: 16px;
      color: #555;
    }

    .foto-container.visible {
      opacity: 1;
      transform: translateY(0) rotate(-3deg);
    }
    
    .foto-container.visible:nth-child(even) {
        transform: translateY(0) rotate(3deg);
    }

    .foto-container:hover {
      transform: scale(1.1) rotate(0deg) !important;
      z-index: 10;
    }

    /* SOBRE DE CARTA */
    #sobre {
      cursor: pointer;
      font-size: 80px;
      transition: 0.3s;
      display: block;
      margin: 40px auto;
    }
    #sobre:hover { transform: scale(1.2); }

    #carta-texto {
      display: none; /* Oculta hasta que se clica el sobre */
      background: #fffbe6;
      border: 1px solid #f0e68c;
      padding: 30px;
      width: 80%;
      max-width: 500px;
      margin: 20px auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      line-height: 1.6;
      color: #444;
      border-radius: 10px;
    }

    .corazon-caida {
      position: fixed;
      top: -10vh;
      z-index: 999;
      animation: caer linear forwards;
    }

    @keyframes caer {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>Feliç Aniversari ❤️</h1>

  <div id="tiempo-juntos">
    <p id="titulo-contador" style="margin: 0; color: #ff4d6d;">Cargando...</p>
    <h2 id="reloj" style="margin: 5px 0; color: #333;"></h2>
  </div>

  <div id="galeria">
    <div class="foto-container">
      <img src="Foto1.jpg" alt="Barça">
      <p>BARÇAAAA 💙❤️</p>
    </div>

    <div class="foto-container">
      <img src="Foto3.jpg" alt="Nosotros">
      <p>Un dels dies més feliços ❤️</p>
    </div>

    <div class="foto-container">
      <img src="Foto2.jpg" alt="Nosotros">
      <p>El nostre primer viatge 🌍</p>
    </div>

    <div class="foto-container">
      <img src="Foto4.jpg" alt="Nosotros">
      <p>Moments inoblidables 💫</p>
    </div>
  </div>

  <div id="sobre" onclick="abrirCarta()">✉️</div>
  
  <div id="carta-texto">
    <h3>Per a la meva nena ❤️</h3>
    <p>Aquí pots escriure tot el que vulguis. <br> Gràcies per aquest temps junts, ets la persona més especial del món. <br> T'estimo moltíssim!</p>
  </div>

  <script>
    // 1. CARTA
    function abrirCarta() {
      const carta = document.getElementById("carta-texto");
      const sobre = document.getElementById("sobre");
      if(carta.style.display === "block") {
        carta.style.display = "none";
        sobre.innerText = "✉️";
      } else {
        carta.style.display = "block";
        sobre.innerText = "📂";
        window.scrollTo(0, document.body.scrollHeight);
      }
    }

    // 2. CONTADOR (1 Abril 2025)
    const fechaInicio = new Date(2025, 3, 1); 
    function actualizarReloj() {
      const ahora = new Date();
      const dif = ahora - fechaInicio;
      const dias = Math.floor(Math.abs(dif) / (1000 * 60 * 60 * 24));
      const horas = Math.floor((Math.abs(dif) / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((Math.abs(dif) / 1000 / 60) % 60);
      const segs = Math.floor((Math.abs(dif) / 1000) % 60);
      document.getElementById('titulo-contador').innerText = dif < 0 ? "Faltan para nuestro día:" : "Llevamos juntos:";
      document.getElementById('reloj').innerText = `${dias}d ${horas}h ${mins}m ${segs}s`;
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    // 3. CORAZONES
    function crearCorazon() {
      const corazon = document.createElement("div");
      corazon.className = "corazon-caida";
      corazon.innerHTML = "❤️";
      corazon.style.left = Math.random() * 100 + "vw";
      corazon.style.fontSize = Math.random() * 20 + 15 + "px";
      corazon.style.animationDuration = Math.random() * 3 + 3 + "s";
      document.body.appendChild(corazon);
      setTimeout(() => { corazon.remove(); }, 6000);
    }
    setInterval(crearCorazon, 400);

    // 4. SCROLL EFFECT
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.foto-container').forEach(el => observer.observe(el));
  </script>

</body>
</html>
