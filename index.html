<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliç Aniversari❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #ffe6e6, #fff);
      text-align: center;
    }

    h1 {
      color: #ff4d6d;
      margin-top: 40px;
    }

    p {
      font-size: 18px;
    }

    img {
      width: 300px;
      border-radius: 20px;
      margin: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    button {
      padding: 12px 25px;
      background-color: #ff4d6d;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #ff1f4b;
    }
  </style>
</head>

<body>

  <h1>Feliç Aniversari❤️</h1>
  <p>Gràcies per aquest any increïble amb tu</p>

  <img src="Foto1" alt="Nosotros">

  <br>
  <button onclick="mensaje()">Clica aquí 💌</button>

  <script>
    function mensaje() {
      alert("Ets el millor que m'ha passat en aquesta vida❤️");
    }
  </script>

</body>
</html>
