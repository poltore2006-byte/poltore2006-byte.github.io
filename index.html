<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliç Aniversari ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to bottom, #ffe6e6, #ffffff);
      text-align: center;
      overflow-x: hidden;
    }

    h1 { color: #ff4d6d; margin-top: 40px; font-size: 35px; }

    #tiempo-juntos {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 10;
      position: relative;
    }

    /* --- ESTILOS DE LA LÍNEA DE TIEMPO --- */
    .timeline {
      position: relative;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px 0;
    }

    /* La línea vertical central */
    .timeline::after {
      content: '';
      position: absolute;
      width: 4px;
      background-color: #ff4d6d;
      top: 0;
      bottom: 0;
      left: 50%;
      margin-left: -2px;
      border-radius: 10px;
    }

    .container-timeline {
      padding: 10px 40px;
      position: relative;
      background-color: inherit;
      width: 50%;
      box-sizing: border-box;
    }

    /* El corazón que marca el punto en la línea */
    .container-timeline::after {
      content: '❤️';
      position: absolute;
      right: -12px;
      top: 20px;
      z-index: 1;
      font-size: 20px;
      background: #ffe6e6;
    }

    /* Orientación izquierda y derecha */
    .left { left: 0; text-align: right; }
    .right { left: 50%; text-align: left; }
    .right::after { left: -12px; }

    /* Ajuste para que las fotos no choquen con la línea */
    .left .foto-container { margin-right: 0; }
    .right .foto-container { margin-left: 0; }

    /* Estilo Polaroid (tu código original mejorado) */
    @keyframes brillo {
      0% { box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
      50% { box-shadow: 0 0 25px rgba(255, 77, 109, 0.6); }
      100% { box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    }

    .foto-container {
      display: inline-block;
      background: white;
      padding: 10px 10px 30px 10px;
      border: 1px solid #ddd;
      transition: 0.4s;
      animation: brillo 3s infinite;
      max-width: 250px;
