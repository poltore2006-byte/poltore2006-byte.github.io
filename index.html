<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliç Aniversari ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: #fff0f3;
      text-align: center;
    }

    h1 { color: #ff4d6d; padding: 20px; margin: 0; }

    #tiempo-juntos {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0 10px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* ESTILO KILÓMETROS */
    #capsula-distancia {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 0 0 30px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid #ffe6e6;
      min-width: 250px;
    }

    #kms { font-size: 24px; font-weight: bold; color: #ff4d6d; }

    /* --- LÍNEA DE TIEMPO SIMPLIFICADA --- */
    .timeline {
      position: relative;
      max-width: 900px;
      margin: 20px auto;
      padding-bottom: 50px;
    }

    .timeline::after {
      content: '';
      position: absolute;
      width: 6px;
      background-color: #ff4d6d;
      top: 0;
      bottom: 0;
      left: 50%;
      margin-left: -3px;
    }

    .container-timeline {
      padding: 20px 40px;
      position: relative;
      width: 50%;
      box-sizing: border-box;
      min-height: 100px;
    }

    .left { left: 0; text-align: right; }
    .right { left: 50%; text-align: left; }

    .container-timeline::after {
      content: '❤️';
      position: absolute;
      width: 25px;
      height: 25px;
      right: -14px;
      top: 30px;
      z-index: 10;
    }
    .right::after { left: -14px; }

    .foto-container {
      background: white;
      padding: 10px;
      border: 1px solid #ddd;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      display: inline-block;
      width: 100%;
      max-width: 280px;
    }

    .foto-container img {
      width: 100%;
      height: auto;
      display: block;
      background: #eee;
    }

    @media screen and (max-width: 600px) {
      .timeline::after { left: 31px; }
      .container-timeline { width: 100%; padding-left: 70px; padding-right: 20px; text-align: left; }
      .container-timeline::after { left: 18px; }
      .right { left: 0%; }
    }

    #sobre { font-size: 80px; cursor: pointer; margin: 50px 0; display: block; }
    
    #carta-texto {
      display: none;
      background: #fffbe6;
      padding: 20px;
      width: 80%;
      max-width: 500px;
      margin: 20px auto;
      border-radius: 10px;
      border: 1px solid #f0e68c;
    }

    .corazon-caida { position: fixed; top: -10vh; z-index: 999; animation: caer linear forwards; }
    @keyframes caer {
      0% { transform: translateY(-10vh); opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>Feliç Aniversari ❤️</h1>

  <div id="tiempo-juntos">
    <p id="titulo-contador" style="margin:0; color:#ff4d6d;">Cargando...</p>
    <h2 id="reloj" style="margin:5px 0;"></h2>
  </div>

  <br>

  <div id="capsula-distancia">
    <p style="margin: 0; font-size: 14px; color: #ff4d6d; font-weight: bold;">DISTÀNCIA RECORREGUDA 🚗</p>
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px;">
      <span id="kms">0</span>
      <span style="font-size: 18px; color: #555;">km per veure't</span>
    </div>
  </div>

  <div class="timeline">
    <div class="container-timeline left">
      <div class="foto-container">
        <img src="Foto1.jpg" alt="Foto 1">
        <p>BARÇAAAA 💙❤️</p>
      </div>
    </div>

    <div class="container-timeline right">
      <div class="foto-container">
        <img src="Foto3.jpg" alt="Foto 3">
        <p>Un dels dies més feliços ❤️</p>
      </div>
    </div>

    <div class="container-timeline left">
      <div class="foto-container">
        <img src="Foto2.jpg" alt="Foto 2">
        <p>El nostre primer viatge 🌍</p>
      </div>
    </div>

    <div class="container-timeline right">
      <div class="foto-container">
        <img src="Foto4.jpg" alt="Foto 4">
        <p>Moments inoblidables 💫</p>
      </div>
    </div>
  </div>

  <div id="sobre" onclick="abrirCarta()">✉️</div>

  <div id="carta-texto">
    <h3>Per a la meva nena ❤️</h3>
    <p>Ets la millor. T'estimo moltíssim!</p>
  </div>

  <script>
    // 1. Contador de tiempo
    const fechaInicio = new Date(2025, 3, 1);
    function actualizarReloj() {
      const ahora = new Date();
      const dif = ahora - fechaInicio;
      const dias = Math.floor(Math.abs(dif) / (1000 * 60 * 60 * 24));
      const horas = Math.floor((Math.abs(dif) / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((Math.abs(dif) / 1000 / 60) % 60);
      const segs = Math.floor((Math.abs(dif) / 1000) % 60);
      document.getElementById('titulo-contador').innerText = dif < 0 ? "Faltan para nuestro día:" : "Llevamos juntos:";
      document.getElementById('reloj').innerText = dias + "d " + horas + "h " + mins + "m " + segs + "s";
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    // 2. Animación de Kilómetros
    const kmsTotales = 78; // <--- CAMBIA ESTE NÚMERO POR TU DISTANCIA REAL
    let contadorKms = 0;
    function animarKms() {
      const elementoKms = document.getElementById("kms");
      const paso = kmsTotales / 50; 
      const intervalo = setInterval(() => {
        contadorKms += paso;
        if (contadorKms >= kmsTotales) {
          elementoKms.innerText = kmsTotales.toLocaleString();
          clearInterval(intervalo);
        } else {
          elementoKms.innerText = Math.floor(contadorKms).toLocaleString();
        }
      }, 30);
    }
    animarKms();

    // 3. Abrir Carta
    function abrirCarta() {
      const c = document.getElementById("carta-texto");
      c.style.display = c.style.display === "block" ? "none" : "block";
      if(c.style.display === "block") c.scrollIntoView({behavior:'smooth'});
    }

    // 4. Lluvia de Corazones
    setInterval(() => {
      const cor = document.createElement("div");
      cor.className = "corazon-caida";
      cor.innerHTML = "❤️";
      cor.style.left = Math.random() * 100 + "vw";
      cor.style.fontSize = Math.random() * 20 + 10 + "px";
      cor.style.animationDuration = Math.random() * 3 + 2 + "s";
      document.body.appendChild(cor);
      setTimeout(() => cor.remove(), 5000);
    }, 500);
  </script>

</body>
</html>
